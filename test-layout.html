<!doctype html>
<html>
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div
      className="w-full max-w-6xl mx-auto p-6 bg-white rounded-xl shadow-lg border border-slate-100 text-slate-800"
    >
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8 border-b pb-4"
      >
        <div class="flex items-center gap-4">
          <h1 class="text-3xl font-bold text-slate-900">
            Purchase Contract Timeline
          </h1>
        </div>
        <div
          class="grid grid-cols-2 md:grid-cols-3 gap-2 w-full lg:w-auto shrink-0"
        >
          <button
            class="flex justify-center items-center gap-2 bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full"
          >
            New Timeline
          </button>
          <button
            class="flex justify-center items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full"
          >
            Save Timeline
          </button>
          <button
            class="flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full"
          >
            Load Timeline
          </button>
          <button
            class="flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full"
          >
            INSTRUCTIONS
          </button>
          <button
            class="flex justify-center items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full whitespace-nowrap"
          >
            Convert to PDF
          </button>
          <button
            class="flex justify-center items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-medium transition-colors w-full whitespace-nowrap"
          >
            Export Excel
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
